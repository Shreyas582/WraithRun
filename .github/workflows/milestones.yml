name: Milestone Bootstrap

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Milestone title (example: v0.2.0)"
        required: true
        type: string
      description:
        description: "Milestone description"
        required: false
        type: string
      due_date:
        description: "Due date in YYYY-MM-DD (optional)"
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  upsert-milestone:
    name: Create milestone if missing
    runs-on: ubuntu-latest
    steps:
      - name: Upsert milestone
        uses: actions/github-script@v7
        with:
          script: |
            const title = core.getInput("title").trim();
            const description = core.getInput("description");
            const dueDate = core.getInput("due_date").trim();
            const { owner, repo } = context.repo;

            if (!title) {
              core.setFailed("Milestone title is required.");
              return;
            }

            if (dueDate && !/^\d{4}-\d{2}-\d{2}$/.test(dueDate)) {
              core.setFailed("due_date must match YYYY-MM-DD.");
              return;
            }

            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner,
              repo,
              state: "all",
              per_page: 100,
            });

            const existing = milestones.find((m) => m.title === title);
            if (existing) {
              core.notice(`Milestone '${title}' already exists (state: ${existing.state}).`);
              return;
            }

            await github.rest.issues.createMilestone({
              owner,
              repo,
              title,
              description: description || undefined,
              due_on: dueDate ? new Date(`${dueDate}T00:00:00Z`).toISOString() : undefined,
            });

            core.notice(`Created milestone '${title}'.`);
