name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v0.2.0)"
        required: true
        type: string
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write   # Required for SLSA provenance attestation

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Release preflight checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
            draft="${{ github.event.inputs.draft }}"
          else
            tag="${GITHUB_REF_NAME}"
            draft="false"
          fi

          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag format: $tag"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

      - name: Validate release documentation coverage
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.meta.outputs.version }}"

          if ! grep -Eq "^## ${version} - " CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section for ${version}"
            exit 1
          fi

          changelog_section="$(awk "/^## ${version} - /{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md)"
          if [ -z "$changelog_section" ]; then
            echo "CHANGELOG.md section for ${version} is empty"
            exit 1
          fi

          changelog_non_placeholder_bullets="$(printf '%s\n' "$changelog_section" | grep -E '^- ' | grep -Evi '^- \((none yet|none)\)$' | wc -l | tr -d ' ')"
          if [ "$changelog_non_placeholder_bullets" -eq 0 ]; then
            echo "CHANGELOG.md section for ${version} has no non-placeholder bullet entries"
            echo "Add at least one concrete bullet under Added/Changed/Fixed."
            exit 1
          fi

          if ! grep -Eq "^## v${version}$" docs/upgrades.md; then
            echo "docs/upgrades.md is missing a section header for v${version}"
            exit 1
          fi

          upgrades_section="$(awk "/^## v${version}$/{flag=1;next}/^## v[0-9]+\.[0-9]+\.[0-9]+$/{flag=0}flag" docs/upgrades.md)"
          if [ -z "$upgrades_section" ]; then
            echo "docs/upgrades.md section for v${version} is empty"
            exit 1
          fi

          upgrades_bullets="$(printf '%s\n' "$upgrades_section" | grep -E '^- ' | wc -l | tr -d ' ')"
          if [ "$upgrades_bullets" -eq 0 ]; then
            echo "docs/upgrades.md section for v${version} must include at least one bullet point"
            exit 1
          fi

          for file in README.md docs/getting-started.md docs/cli-reference.md docs/tool-reference.md docs/troubleshooting.md; do
            if [ ! -f "$file" ]; then
              echo "Required release doc file is missing: $file"
              exit 1
            fi
          done

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Workspace check
        run: cargo check --workspace

      - name: Workspace tests
        run: cargo test --workspace

      - name: Validate Vitis feature path
        run: cargo check -p inference_bridge --features vitis

  package-linux:
    name: Package Linux artifacts
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p wraithrun --release

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Package Linux tar/deb/rpm artifacts
        run: |
          set -euo pipefail

          version="${{ needs.verify.outputs.version }}"

          mkdir -p dist/stage/usr/local/bin
          install -m 0755 target/release/wraithrun dist/stage/usr/local/bin/wraithrun

          tar -C dist/stage/usr/local/bin -czf dist/wraithrun-linux-x86_64.tar.gz wraithrun

          fpm -s dir -t deb \
            --name wraithrun \
            --version "$version" \
            --license MIT \
            --description "WraithRun local-first cyber investigation CLI" \
            --prefix /usr/local/bin \
            --package dist/wraithrun-linux-x86_64.deb \
            --chdir dist/stage/usr/local/bin \
            wraithrun

          fpm -s dir -t rpm \
            --name wraithrun \
            --version "$version" \
            --license MIT \
            --description "WraithRun local-first cyber investigation CLI" \
            --prefix /usr/local/bin \
            --package dist/wraithrun-linux-x86_64.rpm \
            --chdir dist/stage/usr/local/bin \
            wraithrun

      - name: Generate SHA-256 checksums for Linux artifacts
        run: |
          set -euo pipefail
          cd dist
          sha256sum wraithrun-linux-x86_64.tar.gz wraithrun-linux-x86_64.deb wraithrun-linux-x86_64.rpm \
            > wraithrun-linux-x86_64.sha256sums

      - name: Smoke check Linux tar.gz install
        run: |
          set -euo pipefail
          mkdir -p dist/smoke-tar
          tar -xzf dist/wraithrun-linux-x86_64.tar.gz -C dist/smoke-tar
          dist/smoke-tar/wraithrun --help > /dev/null

      - name: Smoke check Linux deb install
        run: |
          set -euo pipefail
          sudo dpkg -i dist/wraithrun-linux-x86_64.deb
          /usr/local/bin/wraithrun --help > /dev/null
          sudo dpkg -r wraithrun

      - name: Smoke check Linux rpm install (Fedora container)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/dist:/dist:ro" fedora:40 bash -lc "dnf -y install /dist/wraithrun-linux-x86_64.rpm && wraithrun --help > /dev/null"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-assets
          path: |
            dist/wraithrun-linux-x86_64.tar.gz
            dist/wraithrun-linux-x86_64.deb
            dist/wraithrun-linux-x86_64.rpm
            dist/wraithrun-linux-x86_64.sha256sums
          if-no-files-found: error

  package-macos:
    name: Package macOS artifacts
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      HAS_MACOS_CERT: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
      HAS_MACOS_NOTARIZATION: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p wraithrun --release

      - name: Package macOS tar/pkg artifacts
        run: |
          set -euo pipefail

          version="${{ needs.verify.outputs.version }}"

          mkdir -p dist/stage/usr/local/bin
          install -m 0755 target/release/wraithrun dist/stage/usr/local/bin/wraithrun

          tar -C dist/stage/usr/local/bin -czf dist/wraithrun-macos-x86_64.tar.gz wraithrun

          pkgbuild \
            --root dist/stage \
            --identifier dev.wraithrun.cli \
            --version "$version" \
            --install-location / \
            dist/wraithrun-macos-x86_64.pkg

      - name: Code-sign macOS binary
        if: env.HAS_MACOS_CERT == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain "$(security list-keychains -d user | head -1 | tr -d '"')"
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          codesign --force --sign "$MACOS_SIGNING_IDENTITY" \
            --options runtime --timestamp \
            dist/stage/usr/local/bin/wraithrun
          codesign --verify --deep --strict dist/stage/usr/local/bin/wraithrun
          rm -f /tmp/cert.p12

      - name: Notarize macOS binary
        if: env.HAS_MACOS_NOTARIZATION == 'true'
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          set -euo pipefail
          # Wrap binary in a zip for notarization submission
          ditto -c -k --keepParent dist/stage/usr/local/bin/wraithrun /tmp/wraithrun-notarize.zip
          xcrun notarytool submit /tmp/wraithrun-notarize.zip \
            --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
            --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
            --password "$MACOS_NOTARIZATION_PASSWORD" \
            --wait
          rm -f /tmp/wraithrun-notarize.zip

      - name: Smoke check macOS tar.gz install
        run: |
          set -euo pipefail
          mkdir -p dist/smoke-tar
          tar -xzf dist/wraithrun-macos-x86_64.tar.gz -C dist/smoke-tar
          dist/smoke-tar/wraithrun --help > /dev/null

      - name: Smoke check macOS pkg install
        run: |
          set -euo pipefail
          sudo installer -pkg dist/wraithrun-macos-x86_64.pkg -target /
          /usr/local/bin/wraithrun --help > /dev/null

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-assets
          path: |
            dist/wraithrun-macos-x86_64.tar.gz
            dist/wraithrun-macos-x86_64.pkg
          if-no-files-found: error

  package-windows:
    name: Package Windows artifacts
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE_PFX != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p wraithrun --release

      - name: Install WiX toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y

      - name: Package Windows zip/msi artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Copy-Item target/release/wraithrun.exe dist/wraithrun.exe
          Compress-Archive -Path dist/wraithrun.exe -DestinationPath dist/wraithrun-windows-x86_64.zip -Force

          $sourceExe = (Resolve-Path "target/release/wraithrun.exe").Path
          $productVersion = "${{ needs.verify.outputs.version }}"

          candle.exe -nologo "-dProductVersion=$productVersion" "-dSourceExe=$sourceExe" packaging/windows/wraithrun.wxs -out dist/wraithrun.wixobj
          light.exe -nologo dist/wraithrun.wixobj -out dist/wraithrun-windows-x86_64.msi

      - name: Code-sign Windows binary
        if: env.HAS_WINDOWS_CERT == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:TEMP "wraithrun-sign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
            /f $pfxPath `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /tr http://timestamp.digicert.com `
            /td sha256 /fd sha256 `
            dist\wraithrun.exe `
            dist\wraithrun-windows-x86_64.msi
          Remove-Item $pfxPath -Force

      - name: Generate SHA-256 checksums for Windows artifacts
        shell: pwsh
        run: |
          Get-FileHash dist\wraithrun-windows-x86_64.zip, dist\wraithrun-windows-x86_64.msi -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $([IO.Path]::GetFileName($_.Path))" } |
            Out-File -Encoding utf8 dist\wraithrun-windows-x86_64.sha256sums

      - name: Smoke check Windows zip install
        shell: pwsh
        run: |
          Expand-Archive -Path dist/wraithrun-windows-x86_64.zip -DestinationPath dist/smoke-zip -Force
          & dist/smoke-zip/wraithrun.exe --help | Out-Null

      - name: Smoke check Windows MSI install
        shell: pwsh
        run: |
          $msiPath = (Resolve-Path dist/wraithrun-windows-x86_64.msi).Path
          Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /qn /norestart" -Wait -NoNewWindow

          $installedExe = Join-Path $env:ProgramFiles "WraithRun\wraithrun.exe"
          if (-not (Test-Path $installedExe)) {
            throw "Expected installed executable at $installedExe"
          }

          & $installedExe --help | Out-Null

          Start-Process msiexec.exe -ArgumentList "/x `"$msiPath`" /qn /norestart" -Wait -NoNewWindow

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-assets
          path: |
            dist/wraithrun-windows-x86_64.zip
            dist/wraithrun-windows-x86_64.msi
            dist/wraithrun-windows-x86_64.sha256sums
          if-no-files-found: error

  attest-linux:
    name: SLSA provenance attestation (Linux)
    needs:
      - verify
      - package-linux
    permissions:
      contents: read
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-linux-assets
          path: dist

      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/wraithrun-linux-x86_64.tar.gz
            dist/wraithrun-linux-x86_64.deb
            dist/wraithrun-linux-x86_64.rpm

  publish:
    name: Publish GitHub Release
    needs:
      - verify
      - package-linux
      - package-macos
      - package-windows
      - attest-linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Install Syft
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          set -euo pipefail
          syft dir:. -o spdx-json=dist/SBOM.spdx.json

      - name: Generate checksum manifest
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f ! -name "SHA256SUMS" -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          draft: ${{ needs.verify.outputs.draft }}
          generate_release_notes: true
          files: dist/*
