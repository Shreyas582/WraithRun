name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

template: |
  ## What Changed
  $CHANGES

  ## Notes
  - Validate `cargo check` and `cargo test --workspace` before publishing.
  - Ensure release assets were produced by CI.

categories:
  - title: "Breaking Changes"
    labels:
      - "breaking"
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "Documentation"
    labels:
      - "docs"
  - title: "Testing and Quality"
    labels:
      - "test"
      - "ci"
  - title: "Maintenance"
    labels:
      - "chore"
      - "refactor"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
no-changes-template: "- No user-facing changes."

version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "fix"
      - "bug"
      - "docs"
      - "test"
      - "chore"
      - "ci"
      - "refactor"
  default: patch

autolabeler:
  - label: "docs"
    files:
      - "**/*.md"
      - "docs/**"
  - label: "ci"
    files:
      - ".github/workflows/**"
  - label: "feature"
    files:
      - "core_engine/**"
      - "inference_bridge/**"
      - "cyber_tools/**"
      - "cli/**"
